<title>WhatsApp Contact Form</title>
<style>
    body {

    .container {

    input, textarea {
        width: 90%;

        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
    }
    textarea {
        resize: none;
        height: 100px;
    }
    button {
        width: 100%;
        padding: 12px;
        background: #25D366;
        border: none;
        color: #fff;
        font-size: 16px;
        border-radius: 30px;
        cursor: pointer;
    }
    button:hover {
        background: #1ebe5d;
    }
     .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 60px; border:2px solid #25D366;
            height: 60px;
            border-radius: 50%;
            background-color: #ddd;
            overflow: hidden;
        }

        .name { font-weight: bold; font-size: 1.5rem; }
        .handle { color: #333; font-size: 0.9rem; }
        .bio { font-size: 0.9rem; color: #444; margin-bottom: 20px; padding :0px 7px;line-height: 1.4; }

svg{width:18px; margin-bottom:-2px;}

</head>

<body>
<div style="width:90%;
        padding: 0px 20px;
        margin: 50px 8px 30px 8px;">
 <div class="header">
            <div class="avatar"><img src="https://i.ibb.co/Nd7JJzMf/20250701-232847.jpg" width ="100%"alt="Avatar"></div>
            <div>

                <div class="handle">@imgauranga</div>
            </div>
        </div>
        <p class="bio">This is My personal WhatsApp Chat Box Contact from socialist blogging.</p>
        </div>
       



<div class="container">
    <h2>Contact Us via WhatsApp</h2>

    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>
    <input type="text" id="location" placeholder="Your Location" required>
    <textarea id="message" placeholder="Your Message" required></textarea>

    <button onclick="sendWhatsApp()">Send on WhatsApp</button><br><br>
</div>

<script>
function sendWhatsApp() {
    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var mobile = document.getElementById("mobile").value;
    var location = document.getElementById("location").value;
    var message = document.getElementById("message").value;

    var phoneNumber = "916000012335"; // 👉 अपना WhatsApp नंबर डालें (country code के साथ)

    var whatsappMessage =
        "Name: " + name + "%0A" +
        "Email: " + email + "%0A" +
        "Mobile: " + mobile + "%0A" +
        "Location: " + location + "%0A" +
        "Message: " + message;

    var url = "https://wa.me/" + phoneNumber + "?text=" + whatsappMessage;
    window.open(url, "_blank");
}
</script>

</body>
</html>
