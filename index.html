  <script>        
    const API_KEY = 'AIzaSyD-7ifcYbg0I4v7l44yo-KfSO7SUNU8W28';        
    const FOLDER_ID = '1f6U9Luvm85-s0ofbdWS0KNIAq75zUWCw';

    const blogContainer = document.getElementById('blog-posts');        
    const loader = document.getElementById('loader');    
    const yearFilter = document.getElementById('yearFilter');
    
    let currentUtterance = null;    
    let activePlayButton = null;    
    let speechDataStore = {}; 
    let currentPlayingId = null;

    // SVG Icons
    const playIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="bi bi-volume-down" viewBox="0 0 16 16">
  <path d="M9 4a.5.5 0 0 0-.812-.39L5.825 5.5H3.5A.5.5 0 0 0 3 6v4a.5.5 0 0 0 .5.5h2.325l2.363 1.89A.5.5 0 0 0 9 12zM6.312 6.39 8 5.04v5.92L6.312 9.61A.5.5 0 0 0 6 9.5H4v-3h2a.5.5 0 0 0 .312-.11M12.025 8a4.5 4.5 0 0 1-1.318 3.182L10 10.475A3.5 3.5 0 0 0 11.025 8 3.5 3.5 0 0 0 10 5.525l.707-.707A4.5 4.5 0 0 1 12.025 8"/>
</svg>`;
    const pauseIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-volume-mute" viewBox="0 0 16 16">
  <path d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06M6 5.04 4.312 6.39A.5.5 0 0 1 4 6.5H2v3h2a.5.5 0 0 1 .312.11L6 10.96zm7.854.606a.5.5 0 0 1 0 .708L12.207 8l1.647 1.646a.5.5 0 0 1-.708.708L11.5 8.707l-1.646 1.647a.5.5 0 0 1-.708-.708L10.793 8 9.146 6.354a.5.5 0 1 1 .708-.708L11.5 7.293l1.646-1.647a.5.5 0 0 1 .708 0"/>
</svg>`;

    async function fetchBlogPosts() {            
      try {                
        const listUrl = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='text/plain'+and+trashed=false&fields=files(id,name,modifiedTime)&key=${API_KEY}`;                        
        const response = await fetch(listUrl);                
        const data = await response.json();                                
        if (!data.files || data.files.length === 0) {                    
          loader.innerHTML = "<span>No posts found or folder is not public.</span>";                    
          return;                
        }
        
        data.files.sort((a, b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));        
        loader.style.display = 'none';                
        const availableYears = new Set();
        let animationDelay = 0;
        
        for (let i = 0; i < data.files.length; i++) {            
          const file = data.files[i];            
          const contentUrl = `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${API_KEY}`;                              
          try {                        
            const contentResponse = await fetch(contentUrl);                        
            const textContent = await contentResponse.text();                                                
            const title = file.name.replace('.txt', '');                        
            const dateObj = new Date(file.modifiedTime);            
            const postYear = dateObj.getFullYear();
            availableYears.add(postYear);

            const date = dateObj.toLocaleDateString('en-US', {                            
              day: 'numeric', month: 'short', year: 'numeric'                        
            });
            
            const storageId = `speech_${file.id}`;                        
            speechDataStore[storageId] = textContent;

            const postHTML = `                            
              <article class="post-card" data-year="${postYear}" style="animation-delay: ${animationDelay}s">                                
                <h2 class="post-title">${title}</h2>                                
                <div class="post-meta">                  
                  <span style="display:flex; align-items:center; gap:0.4rem;">                    
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" class="bi bi-calendar3" viewBox="0 0 16 16">                        
                      <path d="M14 0H2a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2M1 3.857C1 3.384 1.448 3 2 3h12c.552 0 1 .384 1 .857v10.286c0 .473-.448.857-1 .857H2c-.552 0-1-.384-1-.857z"/>                        
                      <path d="M6.5 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>                    
                    </svg> ${date}                  
                  </span>                  
                  <button class="audio-control-btn" onclick="toggleSpeech(this, '${storageId}')">                    
                    ${playIcon}
                  </button>                
                </div>                                
                <div class="post-body">${escapeHTML(textContent)}</div>                            
              </article>                        
            `;                        
            blogContainer.innerHTML += postHTML;            
            animationDelay += 0.1;

          } catch (err) {                        
            console.error("Content sync issue:", err);                    
          }                
        }
        setupYearFilter(availableYears);
      } catch (error) {                
        loader.innerHTML = "<span style='color: #ff4757;'>Error loading notebook configuration. Please verify credentials.</span>";                
        console.error(error);            
      }        
    }

    function toggleSpeech(btn, storageId) {      
      const text = speechDataStore[storageId] || "";
      const synth = window.speechSynthesis;

      // स्थिति 1: अगर उसी सेम कार्ड को दोबारा क्लिक किया गया है, तो तुरंत बंद करें
      if (currentPlayingId === storageId) {
        synth.cancel();
        resetActiveButton();
        return;
      }

      // स्थिति 2: अगर कोई अन्य ऑडियो चल रहा है, तो पहले उसे रोकें
      if (synth.speaking || synth.pending) {
        synth.cancel();
        resetActiveButton();
      }

      // ब्राउज़र इंजन को क्लीन होने के लिए 60ms का माइक्रो-डिले दें ताकि री-प्ले हैंग न हो
      setTimeout(() => {
        activePlayButton = btn;            
        currentPlayingId = storageId;
        currentUtterance = new SpeechSynthesisUtterance(text);      

        if (/[\u0980-\u09FF]/.test(text)) {        
          currentUtterance.lang = 'bn-IN';         
          const voices = synth.getVoices();        
          const banglaVoice = voices.find(voice => voice.lang.startsWith('bn'));        
          if (banglaVoice) currentUtterance.voice = banglaVoice;        
        } else if (/[\u0900-\u097F]/.test(text)) {        
          currentUtterance.lang = 'hi-IN';      
        } else {        
          currentUtterance.lang = 'en-US';      
        }            

        currentUtterance.onend = () => { resetActiveButton(); };
        currentUtterance.onerror = () => { resetActiveButton(); };

        setPlayingState(btn);
        synth.speak(currentUtterance);
      }, 60);
    }

    function setPlayingState(btn) {
      btn.innerHTML = pauseIcon;
      btn.classList.add('playing');
    }

    function resetActiveButton() {      
      if (activePlayButton) {        
        activePlayButton.innerHTML = playIcon;
        activePlayButton.classList.remove('playing');        
        activePlayButton = null;      
      }    
      currentPlayingId = null;
    }

    function setupYearFilter(yearsSet) { 
      const sortedYears = Array.from(yearsSet).sort((a, b) => b - a); 
      sortedYears.forEach(year => { 
        const option = document.createElement('option'); 
        option.value = year; 
        option.textContent = year; 
        yearFilter.appendChild(option); 
      });
      yearFilter.style.display = 'inline-block';
      yearFilter.addEventListener('change', (e) => { 
        if (window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
          resetActiveButton();
        }
        const selectedYear = e.target.value; 
        const posts = document.querySelectorAll('.post-card');
        posts.forEach(post => { 
          const postYear = post.getAttribute('data-year'); 
          if (selectedYear === 'all' || postYear === selectedYear) { 
            post.classList.remove('hidden'); 
          } else { 
            post.classList.add('hidden'); 
          } 
        }); 
      }); 
    }

    function escapeHTML(str) {            
      return str.replace(/[&<>'"]/g,                 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)            
      );        
    }
    
    if ('speechSynthesis' in window) {      
      window.speechSynthesis.onvoiceschanged = () => {};    
    }

    fetchBlogPosts();
